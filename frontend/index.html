<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aperture — token-efficiency layer for Composio agents." />
    <meta name="theme-color" content="#000000" />
    <title>Aperture · Composio efficiency layer</title>
    <!-- Theme bootstrap: read stored preference + system, set the class
         before React paints so we never flash the wrong palette. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('aperture.theme.v1') || 'device';
          var system = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          var resolved = pref === 'device' ? system : pref;
          document.documentElement.classList.add(resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
