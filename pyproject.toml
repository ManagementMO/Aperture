[project]
name = "aperture"
version = "0.1.0"
description = "Token attribution, schema-aware compression, safe caching, and benchmarks for Composio agents."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "composio>=0.8.0",
  "pyyaml>=6.0.0",
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
  "tiktoken>=0.7.0",
  "redis>=5.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
]

[project.scripts]
aperture-benchmark = "aperture.cli:benchmark_main"
aperture-connect = "aperture.cli:connect_main"
aperture-live-check = "aperture.cli:live_check_main"
aperture-schema-report = "aperture.cli:schema_report_main"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
  "live: tests that require live external credentials",
]

[tool.uv]
package = true

[tool.setuptools.packages.find]
include = ["aperture*"]

[tool.setuptools.package-data]
aperture = ["**/*.yaml", "**/*.json", "**/*.jsonl"]
