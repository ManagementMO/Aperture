[project]
name = "aperture"
version = "0.1.0"
description = "Token-efficiency layer for Composio-powered agents"
requires-python = ">=3.11"
dependencies = [
  "composio",
  "tiktoken",
  "pyyaml",
  "orjson",
  "rich",
  "typer",
  "streamlit",
  "upstash-redis",
  "pandas",
  "python-dotenv",
]

[dependency-groups]
dev = ["pytest", "ruff"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
